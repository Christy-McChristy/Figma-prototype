<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firelock 198X</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <button class="menu-btn">☰</button>
                <h1 class="title">ZEPHYR 21,9XX</h1>
            </div>
            <button class="icon-btn">●</button>
        </header>

        <div class="content">
            <div class="modal">
                <h2 class="modal-title">The Brand New Tabletop Game</h2>
                <p class="modal-text">
                    Ever want to experience a brand new way of playing with your friend? You want to see how a war would be waged between men, machine and mystical creature? what if Magic mixed in with Sci-fi grift?
                </p>
                <div class="button-group">
                    <button class="action-btn">
                        <span class="btn-icon">●</span>
                        <span class="btn-label">The Lore</span>
                    </button>
                    <button class="action-btn">
                        <span class="btn-icon">◆</span>
                        <span class="btn-label">The Characters</span>
                    </button>
                    <button class="action-btn">
                        <span class="btn-icon">◇</span>
                        <span class="btn-label">The Gameplay</span>
                    </button>
                    <button class="action-btn cyan">
                        <span class="btn-icon">🌍</span>
                        <span class="btn-label">The World</span>
                    </button>
                </div>
                <img src="image 1.png" style="position:fixed; top: 300px; right:400px;">
            </div>
        </div>
    </div>
